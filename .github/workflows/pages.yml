name: Update and publish Rainline City

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "style.css"
      - "wallpaper.js"
      - "refresh-guard.js"
      - "live-data.js"
      - "Update-LiveData.ps1"
      - ".github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "3,9,15,21,27,33,39,45,51,57 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate live data
        shell: pwsh
        run: |
          ./Update-LiveData.ps1 -IntervalSeconds 360 -NoRetryOnFailure -OutFile "$PWD/live-data.js"

      - name: Normalize refresh metadata
        shell: pwsh
        run: |
          $path = Join-Path $PWD "live-data.js"
          $content = Get-Content -Raw $path
          $match = [regex]::Match($content, "window\.RAINLINE_DATA\s*=\s*(.*?);\s*window\.dispatchEvent", [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if (-not $match.Success) {
            throw "Could not find RAINLINE_DATA payload in live-data.js"
          }
          $payload = $match.Groups[1].Value | ConvertFrom-Json
          $generatedAt = [datetimeoffset]::Parse($payload.generatedAt)
          $payload.refreshIntervalSeconds = 360
          $payload.nextRefreshAt = $generatedAt.AddSeconds(360).ToString("o")
          $json = $payload | ConvertTo-Json -Depth 20 -Compress
          $js = "window.RAINLINE_DATA = $json;`nwindow.dispatchEvent(new CustomEvent('rainline-data-updated', { detail: window.RAINLINE_DATA }));`n"
          [System.IO.File]::WriteAllText($path, $js, [System.Text.UTF8Encoding]::new($false))

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
