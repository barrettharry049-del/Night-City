name: Update and publish Rainline City

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "style.css"
      - "wallpaper.js"
      - "live-data.js"
      - "Update-LiveData.ps1"
      - ".github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate live data
        shell: pwsh
        run: |
          ./Update-LiveData.ps1 -NoRetryOnFailure -OutFile "$PWD/live-data.js"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
