name: Update live data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-live-data.yml"
      - "Update-LiveData.ps1"
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rainline-live-data
  cancel-in-progress: true

jobs:
  update-live-data:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh public data file
        shell: pwsh
        run: ./Update-LiveData.ps1 -IntervalSeconds 600 -RetrySeconds 30 -NoRetryOnFailure

      - name: Commit refreshed data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-data.js
          if (git diff --cached --quiet) {
            "live-data.js already current"
            exit 0
          }
          git commit -m "Update live data"
          git push
